---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app factorio-spaceage
  namespace: games
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controllers:
      factorio-spaceage:
        type: statefulset
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: factoriotools/factorio
              tag: 2.0.72
            env:
              PORT: &port 34197
              RCON_PORT: &rcon 27015
              SAVE_NAME: "spaceage"
              LOAD_LATEST_SAVE: false

        # initContainers:
        #   copy-configmap:
        #     image:
        #       repository: busybox
        #       tag: stable@sha256:9ae97d36d26566ff84e8893c64a6dc4fe8ca6d1144bf5b87b2b85a32def253c7
        #     command:
        #       - "sh"
        #       - "-c"
        #       - |
        #         cp -r -f /helmconfig/spaceage /factorio/ && \
        #         chown -R 568:568 /factorio/ && \
        #         chmod -R g+rw /factorio/

        #     securityContext:
        #       runAsUser: 568
        #       runAsGroup: 568
        #       fsGroup: 568
        #       fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "factorio"
        controller: *app
        enabled: true
        type: ClusterIP
        ports:
          server:
            enabled: true
            port: 34197
            targetPort: 34197
            protocol: UDP
          rcon:
            enabled: true
            primary: true
            port: 27015
            targetPort: 27015
            protocol: TCP

    route:
      main:
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: udp-listener
        rules:
          - backendRefs:
              - name: factorio-spaceage
                port: 34197

    persistence:
      config:
        enabled: true
        existingClaim: *app
        advancedMounts:
          - mountPath: /factorio
            subPath: factorio  # Adjust if the actual data is under a different path
      # helmconfig:
      #   type: nfs
      #   server: ${NAS_IP}
      #   path: /zpool-mirror/backups/games/factorio
      #   globalMounts:
      #     - path: /helmconfig

    startupProbe:
      enabled: true
      failureThreshold: 30
      periodSeconds: 10

    resources:
      requests:
        cpu: 15m
        memory: 1555M
      limits:
        memory: 8006M
